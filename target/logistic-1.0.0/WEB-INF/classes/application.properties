# =============================
# Application & Server
# =============================
spring.application.name=SERVICE-AUTH
server.port=${PORT:4800}
server.servlet.context-path=/auth
server.tomcat.threads.max=200
server.from=Local
cors.allowedOrigins=*
api.authUrl=${API_AUTH_URL:https://${RAILWAY_PUBLIC_DOMAIN:service-auth-production.up.railway.app}/auth}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${api.authUrl}

# =============================
# Eureka Client - Production
# =============================

eureka.instance.hostname=${RAILWAY_PUBLIC_DOMAIN:service-auth-production.up.railway.app}
eureka.instance.prefer-ip-address=false

eureka.instance.secure-port-enabled=true
eureka.instance.non-secure-port-enabled=false
eureka.instance.secure-port=443

eureka.instance.status-page-url=https://${RAILWAY_PUBLIC_DOMAIN:service-auth-production.up.railway.app}/auth/actuator/info
eureka.instance.health-check-url=https://${RAILWAY_PUBLIC_DOMAIN:service-auth-production.up.railway.app}/auth/actuator/health
eureka.instance.home-page-url=https://${RAILWAY_PUBLIC_DOMAIN:service-auth-production.up.railway.app}/auth/

eureka.client.enabled=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:https://eureka-server-st.up.railway.app/eureka/}


eureka.instance.instance-id=${spring.application.name}:${RAILWAY_PUBLIC_DOMAIN:service-auth-production.up.railway.app}

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.healthcheck.enabled=true

