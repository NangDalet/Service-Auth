
## Production Servers
#spring.profiles.active=prod

# Eureka Instance Configuration
eureka.instance.hostname=localhost

eureka.instance.instance-id=${spring.application.name}:${server.port}


springdoc.show-actuator=true
springdoc.swagger-ui.tryItOutEnabled=true

# Make swagger aware of context path and gateway
springdoc.swagger-ui.config-url=/auth/v3/api-docs
springdoc.api-docs.resolve-schema-properties=true


# Application & Server
# =============================
spring.application.name=SERVICE-AUTH
server.port=4800
server.servlet.context-path=/auth
server.tomcat.threads.max=200
server.from=Local
cors.allowedOrigins=*
api.authUrl=http://localhost:4800/auth

# Requests to protected service endpoints must come through the gateway.
# Configure the gateway to add this same secret header before forwarding.
gateway.access-control.enabled=true
gateway.internal.header=X-Gateway-Secret
gateway.internal.secret=${GATEWAY_INTERNAL_SECRET:}

# =============================
# Data Source Configuration
# =============================
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
## Use host.docker.internal if running inside Docker and MySQL is on host machine
#spring.datasource.url=jdbc:mysql://192.168.2.84:3306/student_register?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true
#spring.datasource.username=root
#spring.datasource.password=

# Data Source Configuration
spring.datasource.driverClassName = com.mysql.cj.jdbc.Driver
#spring.datasource.jdbc-url = jdbc:mysql://localhost:3308/student_register?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true
spring.datasource.jdbc-url = jdbc:mysql://192.168.2.70:3306/student_register?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true
spring.datasource.username = root
spring.datasource.password =

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1

# =============================
# Jackson
# =============================
spring.jackson.default-property-inclusion=non_null

# =============================
# Security / JWT
# =============================
spring.security.user.password=passwordEncoder

jwt.private.key.path=classpath:key/private_key.pem
jwt.public.key.path=classpath:key/public_key.pem
jwt.client.secret=#SDRGS9873984DT
jwt.access.token.expiration.ms=900000
jwt.refresh.token.expiration.ms=1800000
jwt.issuer=logistic
jwt.audience=logistic-api

# OAuth2 Authorization Server
oauth2.issuer-uri=${api.authUrl}
oauth2.client-id=${OAUTH2_CLIENT_ID:service-auth-client}
oauth2.client-secret=${OAUTH2_CLIENT_SECRET:service-auth-secret}
oauth2.client-scopes=read,write,trust
spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:key/public_key.pem

# =============================
# Eureka Client
# =============================
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:9000/eureka/

# =============================
# Spring Cloud Config
# =============================
spring.cloud.config.enabled=false
spring.config.import=optional:configserver:http://localhost:8071

# =============================
# Swagger / OpenAPI
# =============================
#springdoc.api-docs.enabled=true
#springdoc.swagger-ui.enabled=true
#springdoc.swagger-ui.operationsSorter=alpha
#springdoc.swagger-ui.defaultModelsExpandDepth=-1
#springdoc.swagger-ui.defaultModelExpandDepth=0
#springdoc.swagger-ui.docExpansion=none
#springdoc.swagger-ui.path=/swagger-ui.html
#springdoc.api-docs.path=/api-docs

# =============================
# Swagger / OpenAPI (IMPORTANT)
# =============================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always


logging.level.com.dt.student.register=DEBUG
logging.pattern.level= "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"
