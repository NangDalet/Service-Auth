# =============================
# Application & Server
# =============================
spring.application.name=SERVICE-AUTH
server.port=${PORT:4800}
server.servlet.context-path=/auth
server.tomcat.threads.max=200
server.from=Local
cors.allowedOrigins=*
api.authUrl=${API_AUTH_URL:https://${RAILWAY_PUBLIC_DOMAIN:service-auth-production-f60f.up.railway.app}/auth}

# =============================
# Eureka Client - Production
# =============================
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:https://eureka-server-st.up.railway.app/eureka/}

eureka.instance.hostname=${RAILWAY_PUBLIC_DOMAIN:service-auth-production-f60f.up.railway.app}
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${RAILWAY_PUBLIC_DOMAIN:service-auth-production-f60f.up.railway.app}

eureka.instance.secure-port-enabled=true
eureka.instance.non-secure-port-enabled=false
eureka.instance.secure-port=443

eureka.instance.status-page-url=https://${RAILWAY_PUBLIC_DOMAIN:service-auth-production-f60f.up.railway.app}/auth/actuator/info
eureka.instance.health-check-url=https://${RAILWAY_PUBLIC_DOMAIN:service-auth-production-f60f.up.railway.app}/auth/actuator/health
eureka.instance.home-page-url=https://${RAILWAY_PUBLIC_DOMAIN:service-auth-production-f60f.up.railway.app}/auth/

eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.client.register-with-eureka=${EUREKA_REGISTER_WITH_EUREKA:${EUREKA_CLIENT_ENABLED:false}}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY:${EUREKA_CLIENT_ENABLED:false}}
eureka.client.healthcheck.enabled=${EUREKA_HEALTHCHECK_ENABLED:${EUREKA_CLIENT_ENABLED:false}}

eureka.client.eureka-server-connect-timeout-seconds=10
eureka.client.eureka-server-read-timeout-seconds=30
eureka.client.eureka-connection-idle-timeout-seconds=30
eureka.client.eureka-server-https-port=443

# =============================
# Data Source Configuration
# =============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://reseau.proxy.rlwy.net:52949/railway?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=UTC
spring.datasource.jdbc-url=jdbc:mysql://reseau.proxy.rlwy.net:52949/railway?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=MlbxbViwfSdAmgxTIxvxHLLwfSoBVfYa

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=10000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.initialization-fail-timeout=60000

# =============================
# Security / JWT
# =============================
spring.security.user.password=passwordEncoder
jwt.issuer=logistic
jwt.audience=logistic-api
jwt.private.key.path=classpath:key/private_key.pem
jwt.public.key.path=classpath:key/public_key.pem
jwt.access.token.expiration.ms=900000
jwt.refresh.token.expiration.ms=1800000
spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:key/public_key.pem
spring.security.oauth2.resourceserver.jwt.issuer-uri=${api.authUrl}

# =============================
# Jackson
# =============================
spring.jackson.default-property-inclusion=non_null

# =============================
# Actuator / Management
# =============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# =============================
# Spring Cloud Config
# =============================
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# =============================
# Logging
# =============================
logging.level.com.netflix.discovery=INFO
logging.level.org.springframework.cloud.netflix.eureka=INFO
logging.level.org.springframework.web.client=INFO
logging.pattern.level=%5p [${spring.application.name},%X{trace_id},%X{span_id}]
