# =============================
# PRODUCTION CONFIGURATION
# =============================

# Application & Server
spring.application.name=SERVICE-AUTH
server.port=4800
server.servlet.context-path=/auth
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# =============================
# Data Source Configuration (Use Environment Variables)
# =============================
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.jdbc-url=${DB_URL:jdbc:mysql://localhost:3306/student_register?createDatabaseIfNotExist=false&useUnicode=true&characterEncoding=utf-8&allowMultiQueries=false&useSSL=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# HikariCP Connection Pool (OPTIMIZED FOR PRODUCTION)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1

# =============================
# JPA / Hibernate (DISABLED SQL LOGGING)
# =============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =============================
# Jackson
# =============================
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# =============================
# Circular References
# =============================
spring.main.allow-circular-references=false

# =============================
# Security / JWT (Use Environment Variables)
# =============================
spring.security.user.password=${SECURITY_PASSWORD}

jwt.private.key.path=${JWT_PRIVATE_KEY_PATH:classpath:key/private_key.pem}
jwt.public.key.path=${JWT_PUBLIC_KEY_PATH:classpath:key/public_key.pem}
jwt.client.secret=${JWT_CLIENT_SECRET}
jwt.access.token.expiration.ms=900000
jwt.refresh.token.expiration.ms=1800000
jwt.issuer=${JWT_ISSUER:logistic}
jwt.audience=${JWT_AUDIENCE:logistic-api}

# =============================
# Mail Configuration (Use Environment Variables)
# =============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================
# CORS Configuration (RESTRICT TO SPECIFIC ORIGINS)
# =============================
cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://yourdomain.com}

# =============================
# API Configuration
# =============================
api.authUrl=https://service-auth-production-f60f.up.railway.app/auth

# =============================
# Eureka Client
# =============================
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:9000/eureka/}
eureka.client.register-with-eureka=${EUREKA_REGISTER_WITH_EUREKA:${EUREKA_CLIENT_ENABLED:false}}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY:${EUREKA_CLIENT_ENABLED:false}}

# =============================
# Spring Cloud Config (CENTRALIZED CONFIGURATION)
# =============================
spring.cloud.config.enabled=true
spring.cloud.config.uri=${CONFIG_SERVER_URL:http://localhost:8071}
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8071}

# =============================
# Actuator (RESTRICTED ENDPOINTS)
# =============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# =============================
# Logging Configuration
# =============================
logging.config=classpath:logback-prod.xml
logging.level.root=WARN
logging.level.com.dt.student.register=INFO
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================
# MyBatis
# =============================
mybatis.config-locations=classpath:mybatis/mybatis-config.xml
mybatis.mapper-locations=classpath:mybatis/mapper/primary/*/*.xml
mybatis.type-aliases-package=com.ut.vetTicketTml.model
mybatis.configuration.map-underscore-to-camel-case=true

# =============================
# Swagger / OpenAPI (DISABLE IN PRODUCTION IF NEEDED)
# =============================
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =============================
# Telegram Configuration (Use Environment Variables)
# =============================
telegram.chat.id=${TELEGRAM_CHAT_ID}
telegram.api.token=${TELEGRAM_API_TOKEN}

# =============================
# ABA Payment (Production)
# =============================
aba.merchantId=${ABA_MERCHANT_ID}
aba.apiKey=${ABA_API_KEY}
aba.apiUrl=${ABA_API_URL:https://checkout.payway.com.kh/api/payment-gateway/v1/payments/generate-qr}
aba.callbackUrl=${ABA_CALLBACK_URL:https://yourdomain.com/callback}

# =============================
# Performance & Optimization
# =============================
spring.mvc.dispatch-options-request=true
server.compression.enabled=true
server.compression.min-response-size=1024

# =============================
# Server SSL (ENABLE HTTPS)
# =============================
server.ssl.enabled=true
server.ssl.key-store=${SSL_KEYSTORE_PATH}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat

