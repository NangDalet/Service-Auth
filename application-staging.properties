# =============================
# STAGING CONFIGURATION
# =============================

# Application & Server
spring.application.name=SERVICE-AUTH
server.port=4800
server.servlet.context-path=/auth
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=5

# =============================
# Data Source Configuration
# =============================
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.jdbc-url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# =============================
# Jackson
# =============================
spring.jackson.default-property-inclusion=non_null

# =============================
# Security / JWT
# =============================
spring.security.user.password=${SECURITY_PASSWORD}

jwt.private.key.path=${JWT_PRIVATE_KEY_PATH}
jwt.public.key.path=${JWT_PUBLIC_KEY_PATH}
jwt.client.secret=${JWT_CLIENT_SECRET}
jwt.access.token.expiration.ms=900000
jwt.refresh.token.expiration.ms=1800000
jwt.issuer=${JWT_ISSUER}
jwt.audience=${JWT_AUDIENCE}

# =============================
# CORS Configuration
# =============================
cors.allowedOrigins=${CORS_ALLOWED_ORIGINS}

# =============================
# API Configuration
# =============================
api.authUrl=${API_AUTH_URL}

# =============================
# Eureka Client
# =============================
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:9000/eureka/}
eureka.client.register-with-eureka=${EUREKA_REGISTER_WITH_EUREKA:${EUREKA_CLIENT_ENABLED:false}}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY:${EUREKA_CLIENT_ENABLED:false}}

# =============================
# Spring Cloud Config
# =============================
spring.cloud.config.enabled=true
spring.cloud.config.uri=${CONFIG_SERVER_URL}

# =============================
# Actuator
# =============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized

# =============================
# Logging Configuration
# =============================
logging.config=classpath:logback-staging.xml
logging.level.root=WARN
logging.level.com.dt.student.register=INFO
logging.level.org.springframework.security=INFO

# =============================
# Swagger / OpenAPI (DISABLED)
# =============================
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

