# =============================
# STAGING CONFIGURATION
# =============================

# Application & Server
spring.application.name=SERVICE-AUTH
server.port=4800
server.servlet.context-path=/auth
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=5

# =============================
# Data Source Configuration
# =============================
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.jdbc-url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# =============================
# JPA / Hibernate
# =============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =============================
# Jackson
# =============================
spring.jackson.default-property-inclusion=non_null

# =============================
# Circular References
# =============================
spring.main.allow-circular-references=false

# =============================
# Security / JWT
# =============================
spring.security.user.password=${SECURITY_PASSWORD}

jwt.private.key.path=${JWT_PRIVATE_KEY_PATH}
jwt.public.key.path=${JWT_PUBLIC_KEY_PATH}
jwt.client.secret=${JWT_CLIENT_SECRET}
jwt.access.token.expiration.ms=900000
jwt.refresh.token.expiration.ms=1800000
jwt.issuer=${JWT_ISSUER}
jwt.audience=${JWT_AUDIENCE}

# =============================
# Mail Configuration
# =============================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================
# CORS Configuration
# =============================
cors.allowedOrigins=${CORS_ALLOWED_ORIGINS}

# =============================
# API Configuration
# =============================
api.authUrl=${API_AUTH_URL}

# =============================
# Eureka Client
# =============================
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# =============================
# Spring Cloud Config
# =============================
spring.cloud.config.enabled=true
spring.cloud.config.uri=${CONFIG_SERVER_URL}

# =============================
# Actuator
# =============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized

# =============================
# Logging Configuration
# =============================
logging.config=classpath:logback-staging.xml
logging.level.root=WARN
logging.level.com.dt.student.register=INFO
logging.level.org.springframework.security=INFO

# =============================
# MyBatis
# =============================
mybatis.config-locations=classpath:mybatis/mybatis-config.xml
mybatis.mapper-locations=classpath:mybatis/mapper/primary/*/*.xml
mybatis.type-aliases-package=com.ut.vetTicketTml.model
mybatis.configuration.map-underscore-to-camel-case=true

# =============================
# Swagger / OpenAPI (DISABLED)
# =============================
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# =============================
# Telegram Configuration
# =============================
telegram.chat.id=${TELEGRAM_CHAT_ID}
telegram.api.token=${TELEGRAM_API_TOKEN}

# =============================
# ABA Payment
# =============================
aba.merchantId=${ABA_MERCHANT_ID}
aba.apiKey=${ABA_API_KEY}
aba.apiUrl=${ABA_API_URL}
aba.callbackUrl=${ABA_CALLBACK_URL}

