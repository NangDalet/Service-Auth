# =============================
# JPA / Hibernate (ENABLED SQL LOGGING FOR DEBUG)
# =============================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =============================
# Jackson
# =============================
spring.jackson.default-property-inclusion=non_null

# =============================
# Circular References
# =============================
spring.main.allow-circular-references=true

# =============================
# Security / JWT
# =============================
spring.security.user.password=passwordEncoder

jwt.private.key.path=classpath:key/private_key.pem
jwt.public.key.path=classpath:key/public_key.pem
jwt.client.secret=dev-secret-change-in-production
jwt.access.token.expiration.ms=900000
jwt.refresh.token.expiration.ms=1800000
jwt.issuer=logistic
jwt.audience=logistic-api

# =============================
# Mail Configuration
# =============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-dev-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


# =============================
# API Configuration
# =============================
api.authUrl=http://localhost:4800/auth

# =============================
# Eureka Client - Production
# =============================
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:https://eureka-server-st.up.railway.app/eureka/}

eureka.instance.hostname=${RAILWAY_PUBLIC_DOMAIN:service-branch-production.up.railway.app}
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${RAILWAY_PUBLIC_DOMAIN:service-branch-production.up.railway.app}

eureka.instance.secure-port-enabled=true
eureka.instance.non-secure-port-enabled=false
eureka.instance.secure-port=${PORT:4007}

eureka.instance.status-page-url=https://${RAILWAY_PUBLIC_DOMAIN:service-branch-production.up.railway.app}/branch/actuator/info
eureka.instance.health-check-url=https://${RAILWAY_PUBLIC_DOMAIN:service-branch-production.up.railway.app}/branch/actuator/health
eureka.instance.home-page-url=https://${RAILWAY_PUBLIC_DOMAIN:service-branch-production.up.railway.app}/branch/

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.healthcheck.enabled=true

eureka.client.eureka-server-connect-timeout-seconds=10
eureka.client.eureka-server-read-timeout-seconds=30
eureka.client.eureka-connection-idle-timeout-seconds=30
eureka.client.eureka-server-https-port=443

# =============================
# Spring Cloud Config
# =============================
spring.cloud.config.enabled=false

# =============================
# Actuator
# =============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# =============================
# Logging Configuration
# =============================
logging.config=classpath:logback-dev.xml
logging.level.root=INFO
logging.level.com.dt.student.register=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================
# MyBatis
# =============================
mybatis.config-locations=classpath:mybatis/mybatis-config.xml
mybatis.mapper-locations=classpath:mybatis/mapper/primary/*/*.xml
mybatis.type-aliases-package=com.ut.vetTicketTml.model
mybatis.configuration.map-underscore-to-camel-case=true

# =============================
# Swagger / OpenAPI
# =============================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

