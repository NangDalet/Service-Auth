# =============================
# DEVELOPMENT CONFIGURATION
# =============================

# Application & Server
spring.application.name=SERVICE-AUTH
server.port=4800
server.servlet.context-path=/auth
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=2

# =============================
# Data Source Configuration
# =============================
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.jdbc-url=jdbc:mysql://localhost:3306/student_register?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true
spring.datasource.username=root
spring.datasource.password=

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# =============================
# JPA / Hibernate (ENABLED SQL LOGGING FOR DEBUG)
# =============================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =============================
# Jackson
# =============================
spring.jackson.default-property-inclusion=non_null

# =============================
# Circular References
# =============================
spring.main.allow-circular-references=true

# =============================
# Security / JWT
# =============================
spring.security.user.password=passwordEncoder

jwt.private.key.path=classpath:key/private_key.pem
jwt.public.key.path=classpath:key/public_key.pem
jwt.client.secret=dev-secret-change-in-production
jwt.access.token.expiration.ms=900000
jwt.refresh.token.expiration.ms=1800000
jwt.issuer=logistic
jwt.audience=logistic-api

# =============================
# Mail Configuration
# =============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-dev-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================
# CORS Configuration
# =============================
cors.allowedOrigins=http://localhost:3000,http://localhost:4200,http://127.0.0.1:*

# =============================
# API Configuration
# =============================
api.authUrl=http://localhost:4800/auth

# =============================
# Eureka Client
# =============================
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=http://localhost:9000/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# =============================
# Spring Cloud Config
# =============================
spring.cloud.config.enabled=false

# =============================
# Actuator
# =============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# =============================
# Logging Configuration
# =============================
logging.config=classpath:logback-dev.xml
logging.level.root=INFO
logging.level.com.dt.student.register=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================
# MyBatis
# =============================
mybatis.config-locations=classpath:mybatis/mybatis-config.xml
mybatis.mapper-locations=classpath:mybatis/mapper/primary/*/*.xml
mybatis.type-aliases-package=com.ut.vetTicketTml.model
mybatis.configuration.map-underscore-to-camel-case=true

# =============================
# Swagger / OpenAPI
# =============================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =============================
# Telegram Configuration
# =============================
telegram.chat.id=-10024644393755
telegram.api.token=dev-token-change-in-production

# =============================
# ABA Payment (Development Sandbox)
# =============================
aba.merchantId=theskyev
aba.apiKey=dev-api-key-change-in-production
aba.apiUrl=https://checkout-sandbox.payway.com.kh/api/payment-gateway/v1/payments/generate-qr
aba.callbackUrl=http://localhost:4561/callback

