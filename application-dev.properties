# =============================
# DEVELOPMENT CONFIGURATION
# =============================

# Application & Server
spring.application.name=SERVICE-AUTH
server.port=4800
server.servlet.context-path=/auth
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=2

# =============================
# Data Source Configuration
# =============================
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.jdbc-url=jdbc:mysql://localhost:3306/student_register?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true
spring.datasource.username=root
spring.datasource.password=

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# =============================
# Jackson
# =============================
spring.jackson.default-property-inclusion=non_null

# =============================
# Security / JWT
# =============================
spring.security.user.password=passwordEncoder

jwt.private.key.path=classpath:key/private_key.pem
jwt.public.key.path=classpath:key/public_key.pem
jwt.client.secret=dev-secret-change-in-production
jwt.access.token.expiration.ms=900000
jwt.refresh.token.expiration.ms=1800000
jwt.issuer=logistic
jwt.audience=logistic-api


# =============================
# API Configuration
# =============================
api.authUrl=https://service-auth-production-f60f.up.railway.app/auth

# =============================
# Eureka Client
# =============================
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:9000/eureka/}
eureka.client.register-with-eureka=${EUREKA_REGISTER_WITH_EUREKA:${EUREKA_CLIENT_ENABLED:false}}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY:${EUREKA_CLIENT_ENABLED:false}}

# =============================
# Spring Cloud Config
# =============================
spring.cloud.config.enabled=false

# =============================
# Actuator
# =============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# =============================
# Logging Configuration
# =============================
logging.config=classpath:logback-dev.xml
logging.level.root=INFO
logging.level.com.dt.student.register=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================
# Swagger / OpenAPI
# =============================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
